name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read module metadata
        id: meta
        run: |
          version=$(grep '^version=' module.prop | cut -d= -f2-)
          versionCode=$(grep '^versionCode=' module.prop | cut -d= -f2-)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "versionCode=$versionCode" >> "$GITHUB_OUTPUT"

      - name: Package module
        run: |
          chmod +x build.sh scripts/package.sh collect-boot-audit.sh customize.sh service.sh post-fs-data.sh verify-targets.sh
          ./build.sh

      - name: Write update manifest
        run: |
          cat > update.json <<EOF
          {
            "version": "${{ steps.meta.outputs.version }}",
            "versionCode": ${{ steps.meta.outputs.versionCode }},
            "zipUrl": "https://github.com/${{ github.repository }}/releases/latest/download/LyrinoxOS-Debloat-ArmorX13-${{ steps.meta.outputs.version }}.zip",
            "changelog": "Safe debloat and conservative tuning updates for the Ulefone Armor X13.",
            "notes": "Generated by the release workflow from module.prop."
          }
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LyrinoxOS-Debloat-ArmorX13-${{ steps.meta.outputs.version }}.zip
            update.json
          tag_name: ${{ github.ref_name }}
          name: LyrinoxOS-Debloat-ArmorX13 ${{ steps.meta.outputs.version }}
          generate_release_notes: true